<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VoiceThread</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --phone: #ffffff;
      --blue: #0b93f6;
      --gray-bubble: #e9e9eb;
      --text: #111;
      --muted: #8a8a8e;
      --danger: #d23b3b;
      --line: #e2e2e6;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 460px;
      height: 100dvh;
      background: var(--phone);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,.08);
    }

    /* ---- Top bar ---- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(8px);
    }
    .title { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #0b93f6, #6fc1ff);
      display: grid; place-items: center; color: #fff; font-weight: 700;
    }
    .appname { font-weight: 700; font-size: 17px; line-height: 1.1; }
    .subtitle { font-size: 12px; color: var(--muted); }

    .drive-toggle {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; cursor: pointer; user-select: none;
      padding: 6px 10px; border-radius: 999px; border: 1px solid var(--line);
    }
    .drive-toggle input { accent-color: var(--blue); width: 16px; height: 16px; }

    /* ---- Warning banner (e.g. missing API key) ---- */
    .banner {
      background: #fff3f3; color: var(--danger);
      border-bottom: 1px solid #f3d2d2;
      padding: 10px 16px; font-size: 13px; line-height: 1.4;
    }
    .hidden { display: none !important; }

    /* ---- Thread ---- */
    .thread {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: var(--phone);
    }
    .msg { display: flex; flex-direction: column; max-width: 82%; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg.self  { align-self: flex-end;   align-items: flex-end; }

    .meta { font-size: 11px; color: var(--muted); margin: 0 8px 3px; }

    .bubble-row { display: flex; align-items: center; gap: 8px; }
    .msg.self .bubble-row { flex-direction: row-reverse; }

    .bubble {
      padding: 9px 13px; border-radius: 18px; font-size: 16px; line-height: 1.35;
      word-wrap: break-word; white-space: pre-wrap;
    }
    .msg.other .bubble { background: var(--gray-bubble); color: #000; border-bottom-left-radius: 5px; }
    .msg.self  .bubble { background: var(--blue);        color: #fff; border-bottom-right-radius: 5px; }

    .play-btn {
      flex: 0 0 auto;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--line); background: #fff; color: var(--blue);
      font-size: 12px; cursor: pointer; display: grid; place-items: center;
      transition: transform .1s ease, background .15s ease;
    }
    .play-btn:hover { background: #f0f7ff; }
    .play-btn:active { transform: scale(.9); }

    /* Currently-speaking message gets a soft glow. */
    .msg.speaking .bubble {
      box-shadow: 0 0 0 3px rgba(11,147,246,.25);
      animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse { 50% { box-shadow: 0 0 0 6px rgba(11,147,246,.12); } }

    /* ---- Status line ---- */
    .status {
      min-height: 18px; padding: 0 16px 4px; font-size: 13px; color: var(--muted);
      text-align: center;
    }
    .status.error { color: var(--danger); font-weight: 600; }

    /* ---- Controls ---- */
    .controls {
      display: flex; gap: 8px; padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line); background: #fff; flex-wrap: wrap;
    }
    .btn {
      flex: 1 1 auto; min-width: 120px;
      padding: 12px 14px; border-radius: 12px; border: 1px solid var(--line);
      background: #f7f7f9; color: var(--text); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: filter .15s ease, transform .05s ease;
    }
    .btn:hover { filter: brightness(.97); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn.primary.active { background: #c0392b; border-color: #c0392b; } /* "Stop" state */
    .btn.ghost { background: #fff; color: var(--muted); flex: 0 1 auto; min-width: 0; }
    .btn.recording { background: #c0392b; color: #fff; border-color: #c0392b; animation: rec 1s infinite; }
    @keyframes rec { 50% { filter: brightness(1.15); } }
    .btn:disabled { opacity: .5; cursor: default; }

    /* ====================  DRIVING MODE  ==================== */
    /* Big targets, simplified layout, eyes-free. Per-message buttons hidden. */
    body.driving .phone { max-width: 720px; }
    body.driving .thread { font-size: 1.1rem; padding: 22px; }
    body.driving .bubble { font-size: 22px; padding: 14px 18px; }
    body.driving .play-btn { display: none; }           /* one big control instead */
    body.driving .meta { font-size: 14px; }
    body.driving .controls { flex-direction: column; padding: 18px; gap: 12px; }
    body.driving .btn { font-size: 22px; padding: 22px; min-height: 72px; border-radius: 18px; }
    body.driving .btn.ghost { font-size: 17px; padding: 14px; min-height: 0; }
    body.driving .status { font-size: 16px; min-height: 24px; }
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <div class="title">
        <div class="avatar">O</div>
        <div>
          <div class="appname">VoiceThread</div>
          <div class="subtitle" id="subtitle">Ola &amp; Franek</div>
        </div>
      </div>
      <label class="drive-toggle">
        <input type="checkbox" id="driveToggle" />
        <span>🚗 Tryb jazdy</span>
      </label>
    </header>

    <div id="banner" class="banner hidden"></div>

    <main id="thread" class="thread" aria-live="polite"></main>

    <div id="status" class="status" aria-live="polite"></div>

    <footer class="controls">
      <button id="playAll" class="btn primary">▶︎ Odtwórz rozmowę</button>
      <button id="recordBtn" class="btn">🎤 Odpowiedz głosem</button>
      <button id="simulateBtn" class="btn ghost" title="Dodaje przykładową wiadomość przychodzącą">＋ Wiadomość od Oli</button>
    </footer>
  </div>

  <script>
  (() => {
    'use strict';

    // ---- Hardcoded sample SMS thread (Polish) -----------------------------
    // Franek is the app's user (right-side blue bubbles); Ola is the contact.
    const messages = [
      { sender: 'Ola',    text: 'Hej! Jak tam, dojechałeś już?' },
      { sender: 'Franek', text: 'Jeszcze jadę, jakieś 20 minut do domu 🚗' },
      { sender: 'Ola',    text: 'Spoko, nie spiesz się. Zrobić Ci coś do jedzenia?' },
      { sender: 'Franek', text: 'O, jasne! Umieram z głodu 😄' },
      { sender: 'Ola',    text: 'To może być makaron z sosem pomidorowym?' },
      { sender: 'Franek', text: 'Idealnie, dzięki! Do zobaczenia za chwilę ❤️' },
    ];

    // Canned incoming messages used by the "＋ Wiadomość od Oli" button to
    // demo auto-read of new incoming texts (especially in driving mode).
    const incomingPool = [
      'Jadę już do Ciebie, będę za dziesięć minut.',
      'Pamiętasz, żeby kupić mleko w drodze? 🥛',
      'Zadzwoń jak dojedziesz, dobrze?',
      'Świetnie, do zobaczenia niedługo!',
    ];
    let incomingIdx = 0;

    // ---- App state & element refs -----------------------------------------
    const state = { config: { participants: [], hasApiKey: false }, playing: false, recording: false, driving: false };

    const thread      = document.getElementById('thread');
    const statusEl    = document.getElementById('status');
    const banner      = document.getElementById('banner');
    const playAllBtn  = document.getElementById('playAll');
    const recordBtn   = document.getElementById('recordBtn');
    const simulateBtn = document.getElementById('simulateBtn');
    const driveToggle = document.getElementById('driveToggle');

    let currentAudio = null;   // the <audio>/Audio currently playing
    let cancelToken  = 0;      // bumped to cancel an in-progress "play all"
    let mediaRecorder = null;
    let recChunks = [];

    // ---- Small helpers ----------------------------------------------------
    const participant = (name) => (state.config.participants || []).find(p => p.name === name) || {};
    const voiceFor    = (name) => participant(name).voiceId;
    const isSelf      = (name) => !!participant(name).self;

    const escapeHtml = (s) => s.replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || '';
      statusEl.classList.toggle('error', !!isError && !!msg);
    }
    function showBanner(msg) { banner.textContent = msg; banner.classList.remove('hidden'); }
    function scrollToBottom() { thread.scrollTop = thread.scrollHeight; }

    // ---- Rendering --------------------------------------------------------
    function renderThread() {
      thread.innerHTML = '';
      messages.forEach((m, i) => {
        const row = document.createElement('div');
        row.className = 'msg ' + (isSelf(m.sender) ? 'self' : 'other');
        row.dataset.idx = i;
        row.innerHTML = `
          <div class="meta">${escapeHtml(m.sender)}</div>
          <div class="bubble-row">
            <div class="bubble">${escapeHtml(m.text)}</div>
            <button class="play-btn" title="Odtwórz tę wiadomość" aria-label="Odtwórz wiadomość">▶︎</button>
          </div>`;
        row.querySelector('.play-btn').addEventListener('click', () => playMessage(i));
        thread.appendChild(row);
      });
      scrollToBottom();
    }

    function highlightIndex(i) {
      thread.querySelectorAll('.msg.speaking').forEach(el => el.classList.remove('speaking'));
      if (i >= 0) {
        const el = thread.querySelector(`.msg[data-idx="${i}"]`);
        if (el) { el.classList.add('speaking'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      }
    }

    function addMessage(sender, text) {
      messages.push({ sender, text });
      renderThread();
      return messages.length - 1;
    }

    // ---- Audio playback ---------------------------------------------------
    function stopAudio() {
      if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
    }

    // Ask our server (which calls ElevenLabs) for the mp3 of one line, then
    // play it. Resolves when playback finishes; rejects on any error.
    async function speak(text, voiceId) {
      if (!voiceId) throw new Error('Brak voiceId dla tej osoby (sprawdź CONFIG w server.js).');

      const resp = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, voiceId }),
      });
      if (!resp.ok) {
        let msg = 'Nie udało się wygenerować audio.';
        try { msg = (await resp.json()).error || msg; } catch {}
        throw new Error(msg);
      }

      const url = URL.createObjectURL(await resp.blob());
      await new Promise((resolve, reject) => {
        stopAudio();
        const a = new Audio(url);
        currentAudio = a;
        a.onended = () => { URL.revokeObjectURL(url); resolve(); };
        a.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Błąd odtwarzania audio.')); };
        a.play().catch(reject);
      });
    }

    // Play the whole thread top-to-bottom, switching voice per participant.
    async function playConversation() {
      if (state.playing) { stopPlayback(); return; }
      state.playing = true;
      const token = ++cancelToken;
      playAllBtn.textContent = '⏹ Zatrzymaj';
      playAllBtn.classList.add('active');
      recordBtn.disabled = true;
      setStatus('Odtwarzanie rozmowy…');

      let errored = false;
      try {
        for (let i = 0; i < messages.length; i++) {
          if (token !== cancelToken) return;       // cancelled
          highlightIndex(i);
          await speak(messages[i].text, voiceFor(messages[i].sender));
        }
      } catch (e) {
        errored = true;
        setStatus('⚠ ' + e.message, true);
      } finally {
        if (token === cancelToken) {
          state.playing = false;
          playAllBtn.textContent = '▶︎ Odtwórz rozmowę';
          playAllBtn.classList.remove('active');
          recordBtn.disabled = false;
          highlightIndex(-1);
          if (!errored) setStatus('');
        }
      }
    }

    function stopPlayback() {
      cancelToken++;                 // invalidate any running loop
      state.playing = false;
      stopAudio();
      playAllBtn.textContent = '▶︎ Odtwórz rozmowę';
      playAllBtn.classList.remove('active');
      recordBtn.disabled = false;
      highlightIndex(-1);
      setStatus('');
    }

    // Play a single message (used by the per-bubble button and auto-play).
    async function playMessage(i) {
      if (state.playing) stopPlayback();
      try {
        setStatus('Odtwarzanie…');
        highlightIndex(i);
        await speak(messages[i].text, voiceFor(messages[i].sender));
        highlightIndex(-1);
        setStatus('');
      } catch (e) {
        highlightIndex(-1);
        setStatus('⚠ ' + e.message, true);
      }
    }

    // ---- Reply by voice (MediaRecorder -> /api/stt -> append -> auto-play)-
    async function toggleRecord() {
      if (state.recording) { stopRecording(); return; }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') {
        setStatus('⚠ Nagrywanie nie jest wspierane w tej przeglądarce.', true);
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(recChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          await handleRecordedReply(blob);
        };
        mediaRecorder.start();
        state.recording = true;
        setRecordBtn(true);
        playAllBtn.disabled = true;
        setStatus('● Nagrywanie… kliknij ponownie, aby zakończyć i wysłać.');
      } catch (e) {
        setStatus('⚠ Brak dostępu do mikrofonu. Zezwól na mikrofon w przeglądarce.', true);
      }
    }

    function stopRecording() {
      if (mediaRecorder && state.recording) {
        state.recording = false;
        setRecordBtn(false);
        playAllBtn.disabled = false;
        setStatus('Transkrypcja…');
        mediaRecorder.stop();
      }
    }

    function setRecordBtn(on) {
      recordBtn.textContent = on ? '⏹ Zakończ i wyślij' : '🎤 Odpowiedz głosem';
      recordBtn.classList.toggle('recording', on);
    }

    async function handleRecordedReply(blob) {
      try {
        // Send the raw audio to our server, which forwards it to ElevenLabs Scribe.
        const resp = await fetch('/api/stt', {
          method: 'POST',
          headers: { 'Content-Type': blob.type || 'audio/webm' },
          body: blob,
        });
        if (!resp.ok) {
          let msg = 'Nie udało się przetranskrybować nagrania.';
          try { msg = (await resp.json()).error || msg; } catch {}
          throw new Error(msg);
        }
        const { text } = await resp.json();
        if (!text) { setStatus('⚠ Nie rozpoznano mowy. Spróbuj jeszcze raz.', true); return; }

        const idx = addMessage('Franek', text);  // append as the user's message
        setStatus('');
        await playMessage(idx);                   // ...then auto-play it back
      } catch (e) {
        setStatus('⚠ ' + e.message, true);
      }
    }

    // ---- Simulate an incoming message (demo of auto-read) -----------------
    async function simulateIncoming() {
      const text = incomingPool[incomingIdx % incomingPool.length];
      incomingIdx++;
      const idx = addMessage('Ola', text);
      // Driving mode = eyes-free: read each new incoming message aloud at once.
      if (state.driving) await playMessage(idx);
    }

    // ---- Driving mode -----------------------------------------------------
    function toggleDriving() {
      state.driving = driveToggle.checked;
      document.body.classList.toggle('driving', state.driving);
      setStatus(state.driving
        ? '🚗 Tryb jazdy: nowe wiadomości od Oli czytane są automatycznie.'
        : '');
    }

    // ---- Init -------------------------------------------------------------
    async function init() {
      try {
        const r = await fetch('/api/config');
        state.config = await r.json();
        const names = (state.config.participants || []).map(p => p.name).join(' & ');
        if (names) document.getElementById('subtitle').textContent = names;
      } catch {
        showBanner('⚠ Nie można połączyć się z serwerem. Uruchom „npm start” i odśwież stronę.');
      }
      if (state.config && state.config.hasApiKey === false) {
        showBanner('⚠ Serwer nie ma ustawionego klucza ELEVENLABS_API_KEY — odtwarzanie i transkrypcja nie zadziałają. Ustaw klucz (zobacz README) i zrestartuj serwer.');
      }
      renderThread();
    }

    playAllBtn.addEventListener('click', playConversation);
    recordBtn.addEventListener('click', toggleRecord);
    simulateBtn.addEventListener('click', simulateIncoming);
    driveToggle.addEventListener('change', toggleDriving);

    init();
  })();
  </script>
</body>
</html>
