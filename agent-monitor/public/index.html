<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VoiceThread · Agent Monitor</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root { --bg:#0c0a09; --panel:#161311; --line:#2a2522; --text:#f5f5f5; --dim:#a8a29e; --mut:#777169; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,Segoe UI,Roboto,Inter,sans-serif; }
    .app { display:grid; grid-template-columns:1fr 340px; grid-template-rows:auto 1fr; height:100vh; }
    header { grid-column:1 / 3; display:flex; align-items:center; gap:16px; padding:12px 18px; border-bottom:1px solid var(--line); }
    header h1 { font-size:16px; font-weight:700; margin:0; letter-spacing:-0.2px; }
    header .sub { color:var(--dim); font-size:12px; }
    header .spacer { flex:1; }
    header button { background:#1c1917; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer; }
    header button:hover { background:#242019; }
    #graph { height:100%; }
    .side { border-left:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
    .runs { padding:12px; border-bottom:1px solid var(--line); }
    .runs .r { display:flex; align-items:center; gap:8px; font-size:13px; padding:4px 0; }
    .dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
    .legend { padding:10px 12px; border-bottom:1px solid var(--line); font-size:12px; color:var(--dim); display:flex; flex-wrap:wrap; gap:10px; }
    .legend i { display:inline-block; width:18px; height:0; border-top:2px solid #888; vertical-align:middle; margin-right:4px; }
    .log { flex:1; overflow:auto; padding:10px 12px; font:12px/1.5 ui-monospace,Menlo,Consolas,monospace; color:var(--dim); }
    .log div { white-space:pre-wrap; word-break:break-word; padding:1px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
    .status-conn { font-size:11px; color:var(--mut); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>VoiceThread · Agent Monitor</h1>
      <span class="sub" id="sub">connecting…</span>
      <span class="spacer"></span>
      <span class="status-conn" id="conn">● offline</span>
      <button onclick="reload()">Reload runs</button>
      <button onclick="resetState()">Clear</button>
    </header>
    <div id="graph"></div>
    <div class="side">
      <div class="runs" id="runs"></div>
      <div class="legend">
        <span><i style="border-top-style:solid"></i>deleguje</span>
        <span><i style="border-top-style:dashed"></i>konsultuje</span>
        <span>● queued</span><span style="color:#6cb4ff">● running</span>
        <span style="color:#3ad29f">● done</span><span style="color:#ff8a8a">● failed</span>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    const STATUS_COLOR = { queued:'#777169', running:'#6cb4ff', done:'#3ad29f', failed:'#ff8a8a' };
    // stable-ish color per team
    const TEAM_COLORS = ['#a7e5d3','#f4c5a8','#c8b8e0','#a8c8e8','#e8b8c4','#c9d6a3','#e6c79c'];
    function teamColor(team){ let h=0; for(const c of String(team)) h=(h*31+c.charCodeAt(0))>>>0; return TEAM_COLORS[h%TEAM_COLORS.length]; }

    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();
    const network = new vis.Network(document.getElementById('graph'), { nodes, edges }, {
      nodes: { shape:'dot', size:16, font:{ color:'#f5f5f5', size:13, face:'Inter' }, borderWidth:3 },
      edges: { arrows:{ to:{ enabled:true, scaleFactor:0.5 } }, color:{ color:'#5b534d', opacity:0.7 }, smooth:{ type:'continuous' } },
      groups:{},
      physics:{ stabilization:true, barnesHut:{ gravitationalConstant:-3500, springLength:130, springConstant:0.03 } },
      interaction:{ hover:true, tooltipDelay:120 },
    });

    function render(state){
      const wantNodes = {}, wantEdges = {};
      for (const k in state.nodes){
        const n = state.nodes[k];
        wantNodes[k] = {
          id:k, label:n.role,
          color:{ background:teamColor(n.team), border:STATUS_COLOR[n.status]||'#777', highlight:{ background:teamColor(n.team), border:STATUS_COLOR[n.status]||'#777' } },
          title:`${n.role}\nteam: ${n.team}\nstatus: ${n.status}`,
          size: n.role==='lead' ? 26 : 16,
          font:{ color:'#fff', size: n.role==='lead'?16:13 },
        };
      }
      state.edges.forEach((e,i)=>{ const id='e'+i+e.from+e.to+e.kind; wantEdges[id]={ id, from:e.from, to:e.to, dashes:e.kind!=='delegate', color:{ color: e.kind==='consult'?'#8a8' : e.kind==='fix'?'#d99' : '#5b534d' } }; });

      // diff into datasets
      nodes.update(Object.values(wantNodes));
      nodes.getIds().forEach(id=>{ if(!wantNodes[id]) nodes.remove(id); });
      edges.update(Object.values(wantEdges));
      edges.getIds().forEach(id=>{ if(!wantEdges[id]) edges.remove(id); });

      // runs panel
      const runs = Object.values(state.runs);
      document.getElementById('runs').innerHTML = runs.length
        ? runs.map(r=>`<div class="r"><span class="dot" style="background:${STATUS_COLOR[r.status==='running'?'running':r.status==='failed'?'failed':'done']}"></span><b>${esc(r.name)}</b>${r.phase?` · <span style="color:var(--dim)">${esc(r.phase)}</span>`:''}</div>`).join('')
        : '<div class="r" style="color:var(--mut)">brak przebiegów — odpal workflow albo „Reload runs"</div>';
      document.getElementById('sub').textContent = `${runs.length} run(s) · ${Object.keys(state.nodes).length} agents · ${state.edges.length} edges`;

      // log
      const log = document.getElementById('log');
      log.innerHTML = state.log.slice(-200).map(l=>`<div>${esc(l.msg)}</div>`).join('');
      log.scrollTop = log.scrollHeight;
    }
    const esc = (s)=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

    function connect(){
      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onopen = ()=>{ document.getElementById('conn').textContent='● live'; document.getElementById('conn').style.color='#3ad29f'; };
      ws.onclose = ()=>{ document.getElementById('conn').textContent='● offline'; document.getElementById('conn').style.color='#777'; setTimeout(connect,1500); };
      ws.onmessage = (m)=>{ try{ const d=JSON.parse(m.data); if(d.type==='state') render(d.state); }catch{} };
    }
    function reload(){ fetch('/ingest',{method:'POST'}); }
    function resetState(){ fetch('/api/reset',{method:'POST'}); }
    fetch('/api/state').then(r=>r.json()).then(render).catch(()=>{});
    connect();
  </script>
</body>
</html>
